<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <div class="header-left">
                    <h1>✨ My Todo List</h1>
                    <p class="subtitle">Stay organized and productive</p>
                </div>
                <div class="current-time" id="currentTime">00:00:00</div>
            </div>

            <div class="section">
                <div class="section-title">➕ Add New Task</div>
                <div class="input-section">
                    <input 
                        type="text" 
                        id="todoInput" 
                        placeholder="What needs to be done?" 
                        class="input-field todo-input"
                        autocomplete="off"
                    >
                    <div class="time-controls">
                        <input 
                            type="date" 
                            id="todoDate" 
                            class="input-field date-picker"
                            title="Set task date"
                        >
                        <input 
                            type="time" 
                            id="todoTime" 
                            class="input-field time-picker"
                            title="Set task time"
                        >
                    </div>
                    <button id="addBtn" class="btn btn-primary">Add Task</button>
                </div>
            </div>

            <div class="section">
                <div class="section-controls">
                    <div class="section-title">📋 Tasks</div>
                    <div class="search-section">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search tasks..." 
                            class="input-field search-input"
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="filter-section">
                    <button class="btn btn-filter active" data-filter="all">📌 All</button>
                    <button class="btn btn-filter" data-filter="active">⚡ Active</button>
                    <button class="btn btn-filter" data-filter="completed">✅ Completed</button>
                    <button class="btn btn-filter" data-filter="scheduled">⏰ Scheduled</button>
                </div>

                <ul id="todoList" class="todo-list"></ul>
            </div>

            <div class="section">
                <div class="stats-section">
                    <div class="stats-group">
                        <span id="taskCount" class="stat-item">0 tasks</span>
                        <span id="completionRate" class="stat-highlight">0% complete</span>
                    </div>
                    <button id="clearBtn" class="btn btn-danger">🗑️ Clear Completed</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">💾 Data Management</div>
                <div class="export-section">
                    <button id="exportBtn" class="btn btn-secondary">📥 Export Tasks</button>
                    <button id="importBtn" class="btn btn-secondary">📤 Import Tasks</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
