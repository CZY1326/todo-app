<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>My Todo List</h1>
                <div class="current-time" id="currentTime">00:00:00</div>
            </div>
            
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..." 
                    class="todo-input"
                    autocomplete="off"
                >
                <div class="time-controls">
                    <input 
                        type="date" 
                        id="todoDate" 
                        class="date-picker"
                        title="Set task date"
                    >
                    <input 
                        type="time" 
                        id="todoTime" 
                        class="time-picker"
                        title="Set task reminder time"
                    >
                </div>
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="scheduled">Scheduled</button>
            </div>

            <div class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search tasks..." 
                    class="search-input"
                    autocomplete="off"
                >
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="stats-section">
                <div class="stats-info">
                    <span id="taskCount" class="task-count">0 tasks</span>
                    <span id="completionRate" class="completion-rate">0% complete</span>
                </div>
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>

            <div class="export-section">
                <button id="exportBtn" class="export-btn">📥 Export</button>
                <button id="importBtn" class="import-btn">📤 Import</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
